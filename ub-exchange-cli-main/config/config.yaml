# Docker-internal config for exchange-cli
# This file is mounted into the container at /app/config/config.yaml
# It uses Docker service names instead of localhost

exchange:
  environment: "dev"
  active_external_exchange: "binance"
  domain: "nginx:80"
  imagepath: "nginx:80"
  supportemail: "support@unitedbit.com"

db:
  name: "mysql"
  dsn: "exchange_user:exchange_pass@tcp(db:3306)/exchange_db?parseTime=true"

redis:
  dsn: "redis:6379"
  password: ""
  db: 0

rabbitmq:
  dsn: "amqp://rabbitmquser:some_password@rabbitmq:5672/"
  queue_name: "email_queue_1"

sentry:
  dsn: ""
  debug: false

centrifugo:
  api_url: "http://centrifugo:8000/api"
  api_key: "your-api-key"
  token_hmac_secret: "your-secret-key"

recaptcha:
  secretkey: "secret_key"
  sitekey: "site_key"
  androidsecretkey: "android_secret_key"
  androidsitekey: "android_site_key"

jwt:
  private_key: "config/jwt/private.pem"
  public_key: "config/jwt/public.pem"
  passphrase: "123456789"
  ttl: 2592000

wallet:
  host: "host"
  username: "wallet_username"
  password: "wallet_password"

candle:
  grpcaddr: "exchange-ws:50051"
