# Docker-internal config for exchange-cli
# This file is mounted into the container at /app/config/config.yaml
# It uses Docker service names instead of localhost
#
# Secrets are loaded from environment variables (UBEXCHANGE_ prefix).
# See .env.example for the full list.

exchange:
  environment: "dev"
  active_external_exchange: "binance"
  domain: "nginx:80"
  imagepath: "nginx:80"
  supportemail: "support@unitedbit.com"

db:
  name: "mysql"
  dsn: "" # env: UBEXCHANGE_DB_DSN

redis:
  dsn: "redis:6379"
  password: "" # env: UBEXCHANGE_REDIS_PASSWORD
  db: 0

rabbitmq:
  dsn: "" # env: UBEXCHANGE_RABBITMQ_DSN
  queue_name: "email_queue_1"

sentry:
  dsn: "" # env: UBEXCHANGE_SENTRY_DSN
  debug: false

centrifugo:
  api_url: "http://centrifugo:8000/api"
  api_key: "" # env: UBEXCHANGE_CENTRIFUGO_API_KEY
  token_hmac_secret: "" # env: UBEXCHANGE_CENTRIFUGO_TOKEN_HMAC_SECRET

recaptcha:
  secretkey: "" # env: UBEXCHANGE_RECAPTCHA_SECRETKEY
  sitekey: "site_key"
  androidsecretkey: "" # env: UBEXCHANGE_RECAPTCHA_ANDROIDSECRETKEY
  androidsitekey: "android_site_key"

jwt:
  private_key: "config/jwt/private.pem"
  public_key: "config/jwt/public.pem"
  passphrase: "" # env: UBEXCHANGE_JWT_PASSPHRASE
  ttl: 2592000

wallet:
  host: "" # env: UBEXCHANGE_WALLET_HOST
  username: "" # env: UBEXCHANGE_WALLET_USERNAME
  password: "" # env: UBEXCHANGE_WALLET_PASSWORD

candle:
  grpcaddr: "exchange-ws:50051"

engine:
  worker_count: 10
