# ─────────────────────────────────────────────────────────────
# UnitedBit Exchange — Nginx dev reverse proxy
# Routes requests to PHP-FPM (Symfony) and Go (exchange-httpd)
# ─────────────────────────────────────────────────────────────

# ── Public API & client-facing traffic ──────────────────────
# Default server: proxies most /api/v1/* to Go exchange-httpd,
# falls through to PHP-FPM for Symfony-handled routes.
server {
    listen 80;
    server_name localhost exchange.local;
    root /home/exchange/project/web;

    client_max_body_size 16M;

    # ── Go-handled API routes (exchange-httpd :8000) ────────
    location /api/v1/order/ {
        proxy_pass http://exchange-httpd:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/v1/trade/ {
        proxy_pass http://exchange-httpd:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/currencies {
        proxy_pass http://exchange-httpd:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/user-balance/ {
        proxy_pass http://exchange-httpd:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/crypto-payment {
        proxy_pass http://exchange-httpd:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/withdraw-address {
        proxy_pass http://exchange-httpd:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/order-book {
        proxy_pass http://exchange-httpd:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/trade-book {
        proxy_pass http://exchange-httpd:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/main-data/ {
        proxy_pass http://exchange-httpd:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/user/ {
        proxy_pass http://exchange-httpd:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/user-profile-image/ {
        proxy_pass http://exchange-httpd:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /assets/ {
        proxy_pass http://exchange-httpd:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Centrifugo WebSocket endpoint ─────
    location /connection/websocket {
        proxy_pass http://centrifugo:8000/connection/websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ── Go auth routes (login, register, forgot-password) ───
    location /api/v1/auth/ {
        proxy_pass http://exchange-httpd:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Everything else falls to PHP-FPM (Symfony) ──────────
    location / {
        try_files $uri /app_dev.php$is_args$args;
    }

    location ~ ^/app_dev\.php(/|$) {
        fastcgi_pass exchange-app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log  /var/log/nginx/exchange_error.log;
    access_log /var/log/nginx/exchange_access.log;
    server_tokens off;
}

# ── Admin server block ──────────────────────────────────────
# Host-based routing: admin.exchange.local → PHP-FPM + Go admin
server {
    listen 8082;
    server_name localhost admin.exchange.local;
    root /home/exchange/project/web;

    client_max_body_size 16M;

    # Admin Go routes (order fulfillment, payment callbacks)
    location /api/v1/order/fulfill {
        proxy_pass http://exchange-httpd:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/payment/callback {
        proxy_pass http://exchange-httpd:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/payment/update-withdraw {
        proxy_pass http://exchange-httpd:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/payment/update-deposit {
        proxy_pass http://exchange-httpd:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/user-balance/update {
        proxy_pass http://exchange-httpd:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /assets/ {
        proxy_pass http://exchange-httpd:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Everything else → PHP-FPM
    location / {
        try_files $uri /app_dev.php$is_args$args;
    }

    location ~ ^/app_dev\.php(/|$) {
        fastcgi_pass exchange-app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log  /var/log/nginx/admin_error.log;
    access_log /var/log/nginx/admin_access.log;
    server_tokens off;
}
